<svg xmlns="http://www.w3.org/2000/svg" width="540" height="170" viewBox="0 0 540 170">
<rect width="540" height="170" fill="white"/>
<g font-family="Arial" font-size="14" fill="#111" stroke="#111">
<text x="25" y="25">Same momentum change, different stopping time</text>
<line x1="70" y1="125" x2="230" y2="125"/><rect x="130" y="75" width="50" height="50" fill="#eee"/><path d="M80 95 H125" stroke-width="3" marker-end="url(#arrow)"/><text x="75" y="150">short time → larger force</text>
<line x1="310" y1="125" x2="500" y2="125"/><rect x="380" y="70" width="70" height="55" rx="16" fill="#f5f5f5"/><path d="M320 95 H375" stroke-width="3" marker-end="url(#arrow)"/><text x="315" y="150">longer time → smaller force</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111"/></marker></defs>
</g></svg>